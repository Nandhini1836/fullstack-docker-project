<!DOCTYPE html>
<html>
<head>
    <title>Frontend</title>
</head>
<body>
    <h1>Frontend Running</h1>

    <button onclick="getData()">Call Backend</button>
    <p id="output"></p>

    <script>
        function getData() {
            fetch("http://localhost:5000/api")
            .then(res => res.json())
            .then(data => {
                document.getElementById("output").innerText = data.message;
            });
        }
    </script>
</body>
</html>
